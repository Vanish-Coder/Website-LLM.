<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;500;800&display=swap');
        body { font-family: 'Bricolage Grotesque', sans-serif; background-color: #030303; color: #fff; overflow: hidden; }
        .ultra-glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-border { position: relative; border-radius: 1.5rem; background: #0a0a0a; }
        .gradient-border::after { content: ""; position: absolute; inset: -1px; background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899); border-radius: 1.5rem; z-index: -1; opacity: 0.3; }
        .ai-msg { background: rgba(20, 20, 25, 0.8); border: 1px solid #1f1f23; border-radius: 24px 24px 24px 4px; }
        .user-msg { background: #fff; color: #000; border-radius: 24px 24px 4px 24px; font-weight: 500; }
        .drawer-hide { transform: translateX(-100%); }
        .mic-active { color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/80 z-40 hidden transition-opacity"></div>
    
    <aside id="drawer" class="fixed md:relative w-80 h-full ultra-glass border-r border-white/5 z-50 flex flex-col drawer-hide md:translate-x-0 transition-transform duration-500 ease-in-out">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-black rotate-6 shadow-xl"><i class="fa-solid fa-bolt"></i></div>
                <div><h1 class="text-xl font-extrabold tracking-tighter italic">CHATAI</h1><p class="text-[9px] uppercase tracking-widest text-zinc-500 font-black">Browser Native AI</p></div>
            </div>
        </div>

        <div class="px-6 flex-1 overflow-y-auto custom-scroll space-y-8">
            <div>
                <span class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest px-2">Core Models</span>
                <div class="mt-4 space-y-2">
                    <button onclick="selectModel('Llama-3.2-1B-Instruct-q4f16_1-MLC')" class="w-full p-4 rounded-2xl bg-white/5 border border-white/5 text-left hover:border-blue-500/50 transition-all group">
                        <div class="flex justify-between items-center mb-1"><span class="font-bold">Llama 3.2</span><span class="text-[9px] bg-blue-500/20 text-blue-400 px-2 rounded">Fast</span></div>
                        <p class="text-[10px] text-zinc-500">General purpose reasoning</p>
                    </button>
                    <button onclick="selectModel('gemma-2-2b-it-q4f16_1-MLC')" class="w-full p-4 rounded-2xl bg-white/5 border border-white/5 text-left hover:border-orange-500/50 transition-all">
                        <div class="flex justify-between items-center mb-1"><span class="font-bold">Gemma 2</span><span class="text-[9px] bg-orange-500/20 text-orange-400 px-2 rounded">Fluid</span></div>
                        <p class="text-[10px] text-zinc-500">Creative & visual tasks</p>
                    </button>
                </div>
            </div>

            <div id="dl-status" class="hidden p-5 rounded-2xl bg-blue-500/5 border border-blue-500/10">
                <div class="flex justify-between text-[10px] font-bold text-blue-400 mb-2"><span>SYNCING ENGINE</span><span id="dl-pct">0%</span></div>
                <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden"><div id="dl-bar" class="h-full bg-blue-500 transition-all" style="width:0%"></div></div>
            </div>
        </div>

        <div class="p-6 border-t border-white/5">
            <button onclick="toggleJSON()" id="json-toggle" class="w-full py-3 text-[10px] font-bold uppercase tracking-widest border border-white/10 rounded-xl hover:bg-white/5 mb-3">
                <i class="fa-solid fa-code mr-2"></i> Structured Output: <span id="json-val">OFF</span>
            </button>
            <button onclick="localStorage.clear(); location.reload();" class="w-full py-3 text-[10px] font-bold uppercase tracking-widest text-red-500/80 border border-red-500/10 rounded-xl hover:bg-red-500/5 transition-all">Factory Reset</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-[#030303]">
        <header class="h-16 flex items-center justify-between px-6 border-b border-white/5">
            <button onclick="toggleMenu()" class="md:hidden text-zinc-400"><i class="fa-solid fa-bars-staggered"></i></button>
            <div class="flex items-center gap-3">
                <div id="led" class="w-2 h-2 rounded-full bg-zinc-800"></div>
                <span id="model-name" class="text-xs font-bold uppercase tracking-widest text-zinc-500 italic">No Engine Loaded</span>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="document.getElementById('img-upload').click()" class="text-zinc-500 hover:text-white transition-colors" title="Vision Upload"><i class="fa-solid fa-image"></i></button>
                <input type="file" id="img-upload" class="hidden" accept="image/*">
                <div class="h-4 w-[1px] bg-white/10"></div>
                <span class="text-[10px] font-black text-zinc-600">v1.4 CHATAI</span>
            </div>
        </header>

        <div id="chat-scroller" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-10 custom-scroll">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center max-w-sm mx-auto">
                <div class="w-24 h-24 mb-6 relative">
                    <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full"></div>
                    <i class="fa-solid fa-robot text-4xl text-white relative z-10"></i>
                </div>
                <h3 class="text-2xl font-black mb-3">Local Intelligence</h3>
                <p class="text-zinc-500 text-xs leading-relaxed">Select a model from the left to wake up the engine. Everything you say is processed strictly on your GPU.</p>
            </div>
        </div>

        <div class="p-6 md:p-10">
            <div class="max-w-5xl mx-auto relative group">
                <div class="absolute -top-8 left-0 flex items-center gap-3 opacity-0 group-focus-within:opacity-100 transition-opacity">
                    <span id="typing-indicator" class="text-[9px] font-bold text-zinc-600 uppercase italic">Awaiting Input...</span>
                </div>
                <div class="gradient-border flex items-end gap-2 p-2">
                    <textarea id="chat-input" rows="1" class="flex-1 bg-transparent border-none text-white p-3 focus:outline-none resize-none text-sm md:text-base scrollbar-hide" placeholder="Ask anything..."></textarea>
                    <div class="flex gap-2 p-1">
                        <button onclick="startVoice()" id="mic-btn" class="w-10 h-10 rounded-xl text-zinc-400 hover:text-white transition-colors"><i class="fa-solid fa-microphone"></i></button>
                        <button onclick="handleSend()" class="w-10 h-10 rounded-xl bg-white text-black flex items-center justify-center hover:scale-105 active:scale-95 transition-transform"><i class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        let engine;
        let activeModel = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        let isJsonMode = false;
        const chatInput = document.getElementById('chat-input');
        const scroller = document.getElementById('chat-scroller');

        window.toggleMenu = () => {
            const d = document.getElementById('drawer');
            const o = document.getElementById('overlay');
            d.classList.toggle('drawer-hide');
            o.classList.toggle('hidden');
        };

        window.toggleJSON = () => {
            isJsonMode = !isJsonMode;
            document.getElementById('json-val').innerText = isJsonMode ? 'ON' : 'OFF';
            document.getElementById('json-toggle').classList.toggle('text-blue-400');
        };

        window.selectModel = (id) => {
            activeModel = id;
            if(engine) { engine.unload(); engine = null; }
            init();
            if(window.innerWidth < 768) toggleMenu();
        };

        async function init() {
            document.getElementById('dl-status').classList.remove('hidden');
            document.getElementById('model-name').innerText = "Waking Engine...";
            engine = new webllm.MLCEngine();
            engine.setInitProgressCallback((p) => {
                document.getElementById('dl-bar').style.width = (p.progress * 100) + "%";
                document.getElementById('dl-pct').innerText = Math.round(p.progress * 100) + "%";
                if(p.progress === 1) {
                    setTimeout(() => {
                        document.getElementById('dl-status').classList.add('hidden');
                        document.getElementById('led').classList.replace('bg-zinc-800', 'bg-blue-500');
                        document.getElementById('model-name').innerText = activeModel.split('-')[0];
                    }, 1000);
                }
            });
            await engine.reload(activeModel);
        }

        window.handleSend = async () => {
            const text = chatInput.value.trim();
            if(!text) return;
            if(!engine) await init();

            document.getElementById('empty-state')?.remove();
            append('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            const container = append('ai', '<div class="flex gap-2 p-2"><div class="w-1 h-1 bg-white rounded-full animate-bounce"></div><div class="w-1 h-1 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></div><div class="w-1 h-1 bg-white rounded-full animate-bounce [animation-delay:0.4s]"></div></div>');
            const target = container.querySelector('.content');

            let fullResp = "";
            const opts = { messages: [{role: "user", content: text}], stream: true };
            if(isJsonMode) opts.response_format = { type: "json_object" };

            const stream = await engine.chat.completions.create(opts);
            for await (const chunk of stream) {
                fullResp += chunk.choices[0]?.delta?.content || "";
                target.innerHTML = marked.parse(fullResp);
                scroller.scrollTop = scroller.scrollHeight;
            }
        };

        function append(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-5 duration-500`;
            div.innerHTML = `
                <div class="max-w-[85%] md:max-w-[70%] p-6 ${role === 'user' ? 'user-msg shadow-2xl' : 'ai-msg'}">
                    <div class="text-[8px] uppercase tracking-[0.2em] opacity-40 mb-3 font-black">${role}</div>
                    <div class="content text-sm md:text-base leading-relaxed prose prose-invert font-medium">${text}</div>
                </div>
            `;
            scroller.appendChild(div);
            scroller.scrollTop = scroller.scrollHeight;
            return div;
        }

        window.startVoice = () => {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onstart = () => document.getElementById('mic-btn').classList.add('mic-active');
            recognition.onresult = (e) => {
                chatInput.value = e.results[0][0].transcript;
                document.getElementById('mic-btn').classList.remove('mic-active');
            };
            recognition.start();
        };

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        chatInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) { e.preventDefault(); handleSend(); }
        });
    </script>
</body>
</html>
