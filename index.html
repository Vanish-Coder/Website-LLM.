<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatAI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --accent: #3b82f6;
            --text: #f4f4f5;
            --border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        aside { 
            width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100;
        }
        main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        header { 
            height: 64px; border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 24px; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px);
        }
        #chat-container { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 20px; border-radius: 20px; line-height: 1.6; font-size: 15px; position: relative; animation: fadeIn 0.4s ease; }
        .user-msg { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .input-area { padding: 24px; background: linear-gradient(transparent, var(--bg) 20%); }
        .input-wrapper { 
            max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: flex-end; padding: 12px; transition: border 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        textarea { 
            flex: 1; background: transparent; border: none; color: white; resize: none; 
            padding: 8px; max-height: 200px; outline: none; font-size: 16px;
        }
        .send-btn { 
            width: 40px; height: 40px; background: white; border: none; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }
        .model-card { 
            padding: 16px; margin: 8px 16px; border-radius: 12px; border: 1px solid var(--border); 
            cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.02);
        }
        .model-card:hover { background: rgba(255,255,255,0.05); border-color: #555; }
        .model-card.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .progress-box { padding: 20px; margin-top: auto; border-top: 1px solid var(--border); }
        .progress-bar { height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        pre { background: #000; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid #333; }
        code { font-family: 'Consolas', monospace; color: #60a5fa; }
        .menu-toggle { display: none; background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        @media (max-width: 768px) {
            aside { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            aside.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div style="padding: 32px 24px;">
            <h2 style="letter-spacing: -1px; font-weight: 800; font-size: 24px;">ChatAI</h2>
            <p style="font-size: 10px; color: #666; text-transform: uppercase; margin-top: 4px; font-weight: bold;">v1.6 Bulletproof</p>
        </div>

        <div id="model-list">
            <div class="model-card active" onclick="selectModel('Llama-3.2-1B-Instruct-q4f16_1-MLC', this)">
                <div style="font-weight: bold; font-size: 14px;">Llama 3.2</div>
                <div style="font-size: 11px; opacity: 0.5; margin-top: 2px;">Balanced & Fast</div>
            </div>
            <div class="model-card" onclick="selectModel('gemma-2-2b-it-q4f16_1-MLC', this)">
                <div style="font-weight: bold; font-size: 14px;">Gemma 2</div>
                <div style="font-size: 11px; opacity: 0.5; margin-top: 2px;">Creative Intelligence</div>
            </div>
            <div class="model-card" onclick="selectModel('Phi-3.5-mini-instruct-q4f16_1-MLC', this)">
                <div style="font-weight: bold; font-size: 14px;">Phi 3.5</div>
                <div style="font-size: 11px; opacity: 0.5; margin-top: 2px;">Logical Reasoning</div>
            </div>
        </div>

        <div class="progress-box" id="p-box" style="display: none;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: bold;">
                <span>INITIALIZING GPU</span>
                <span id="p-num">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        </div>

        <div style="padding: 16px; margin-top: auto;">
            <button onclick="localStorage.clear(); location.reload();" style="width: 100%; padding: 12px; background: transparent; border: 1px solid #222; color: #666; border-radius: 8px; font-size: 12px; cursor: pointer;">Clear Cache</button>
        </div>
    </aside>

    <main>
        <header>
            <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="led" style="width: 8px; height: 8px; background: #333; border-radius: 50%;"></div>
                <span id="engine-status" style="font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase;">Standby</span>
            </div>
            <i class="fa-solid fa-shield-halved" style="opacity: 0.2;"></i>
        </header>

        <div id="chat-container">
            <div id="welcome" style="margin: auto; text-align: center; max-width: 400px; opacity: 0.3;">
                <i class="fa-solid fa-bolt" style="font-size: 40px; margin-bottom: 20px;"></i>
                <h3 style="font-size: 24px; margin-bottom: 8px;">Hardware AI</h3>
                <p style="font-size: 14px;">Your browser is directly talking to your GPU. No data leaves this device.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" rows="1" placeholder="Ask anything..." oninput="autoGrow(this)"></textarea>
                <button class="send-btn" onclick="handleInput()"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        let engine;
        let activeId = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        const container = document.getElementById('chat-container');

        window.autoGrow = (el) => {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        };

        window.selectModel = (id, el) => {
            document.querySelectorAll('.model-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            activeId = id;
            if (engine) { engine.unload(); engine = null; }
            init();
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
        };

        async function init() {
            document.getElementById('p-box').style.display = 'block';
            document.getElementById('engine-status').innerText = "Loading...";
            engine = new webllm.MLCEngine();
            engine.setInitProgressCallback((p) => {
                document.getElementById('p-fill').style.width = (p.progress * 100) + "%";
                document.getElementById('p-num').innerText = Math.round(p.progress * 100) + "%";
                if(p.progress === 1) {
                    setTimeout(() => {
                        document.getElementById('p-box').style.display = 'none';
                        document.getElementById('led').style.background = '#3b82f6';
                        document.getElementById('engine-status').innerText = activeId.split('-')[0];
                    }, 1000);
                }
            });
            await engine.reload(activeId);
        }

        window.handleInput = async () => {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;
            if(!engine) await init();

            document.getElementById('welcome')?.remove();
            append('user', val);
            input.value = '';
            input.style.height = 'auto';

            const aiWrap = append('ai', '...');
            const target = aiWrap.querySelector('.txt');
            
            let response = "";
            const stream = await engine.chat.completions.create({ messages: [{role: "user", content: val}], stream: true });
            for await (const chunk of stream) {
                response += chunk.choices[0]?.delta?.content || "";
                target.innerHTML = marked.parse(response);
                container.scrollTop = container.scrollHeight;
            }
        };

        function append(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-msg`;
            div.innerHTML = `<div style="font-size: 9px; font-weight: 900; opacity: 0.5; margin-bottom: 8px; text-transform: uppercase;">${role}</div><div class="txt">${content}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
